<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b0e14; overflow: hidden; }
        .hero {
            background-image: url('background.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center top;
            height: 100vh;
            width: 100%;
            position: relative;
        }
        /* Квадратные кнопки */
        .btn {
            position: absolute;
            width: 8.5%;    /* Узкие, ближе к квадрату */
            height: 6%;     /* Подогнано под высоту чипа */
            cursor: pointer;
            border: 2px solid #00f2ff;
            background: rgba(0, 255, 255, 0.2);
            color: white;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 6px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hero">
        <a href="#" class="btn" style="top: 77.2%; left: 18.2%;">CORE</a>
        <a href="#" class="btn" style="top: 77.2%; left: 32.4%;">JR</a>
        <a href="#" class="btn" style="top: 77.2%; left: 46.5%;">MID</a>
        <a href="#" class="btn" style="top: 77.2%; left: 60.7%;">SR</a>
        <a href="#" class="btn" style="top: 77.2%; left: 74.9%;">LEAD</a>
        <a href="#" class="top: 48.0%; left: 46.5%;">ANL</a>
    </div>
</body>
</html>
