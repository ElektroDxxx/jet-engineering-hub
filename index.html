<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JET Engineering Hub</title>
    <style>
        body { margin: 0; padding: 0; background: #0b0e14; }
        .container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
        }
        .bg-image {
            width: 100%;
            height: auto;
            display: block;
        }
        /* Стили кнопок */
        .nav-btn {
            position: absolute;
            /* Чтобы подогнать кнопки, временно раскомментируй эти две строки */
            /* border: 2px solid #00f2ff; */
            /* background: rgba(0, 255, 255, 0.2); */
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            width: 8.2%;
            height: 5.5%;
            border-radius: 10px;
        }
        .nav-btn:hover { background: rgba(0, 255, 255, 0.2); }

        /* Позиции */
        .btn-anl  { top: 51.5%; left: 50%; transform: translate(-50%, -50%); width: 7%; height: 4%; }
        .btn-core { bottom: 9.8%; left: 19.1%; }
        .btn-jr   { bottom: 9.8%; left: 33.3%; }
        .btn-mid  { bottom: 9.8%; left: 47.5%; }
        .btn-sr   { bottom: 9.8%; left: 61.7%; }
        .btn-lead { bottom: 9.8%; left: 75.9%; }
    </style>
</head>
<body>

<div class="container">
    <img src="background.png" alt="JET Engineering" class="bg-image">
    
    <a href="URL_АНАЛИТИКА" class="nav-btn btn-anl"></a>
    <a href="URL_CORE" class="nav-btn btn-core"></a>
    <a href="URL_JUNIOR" class="nav-btn btn-jr"></a>
    <a href="URL_MIDDLE" class="nav-btn btn-mid"></a>
    <a href="URL_SENIOR" class="nav-btn btn-sr"></a>
    <a href="URL_LEAD" class="nav-btn btn-lead"></a>
</div>

</body>
</html>
