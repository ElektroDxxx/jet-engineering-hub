<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b0e14; overflow: hidden; }
        .hero {
            background-image: url('background.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center top;
            height: 100vh;
            width: 100%;
            position: relative;
        }
        /* Видимые кнопки для настройки */
        .btn {
            position: absolute;
            width: 10%; 
            height: 5%;
            cursor: pointer;
            border: 2px solid #00f2ff; /* Видимая рамка */
            background: rgba(0, 255, 255, 0.2); /* Видимый фон */
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <a href="#" class="btn" style="top: 77%; left: 18.0%;">CORE</a>
        <a href="#" class="btn" style="top: 77%; left: 32.2%;">JR</a>
        <a href="#" class="btn" style="top: 77%; left: 46.4%;">MID</a>
        <a href="#" class="btn" style="top: 77%; left: 60.7%;">SR</a>
        <a href="#" class="btn" style="top: 77%; left: 74.9%;">LEAD</a>
        <a href="#" class="btn" style="top: 50%; left: 46.4%;">ANALYTICS</a>
    </div>
</body>
</html>
