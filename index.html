<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #0b0e14; overflow: hidden; }
        .container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
        }
        .bg-image { width: 100%; height: auto; display: block; }
        
        /* Базовый стиль кнопок: теперь используем flex для идеального центрирования текста */
        .nav-btn {
            position: absolute;
            border: 2px solid #00f2ff;
            background: rgba(0, 255, 255, 0.2);
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 6px;
            /* Размеры, подобранные под размер плашек чипов */
            width: 8.5%;
            height: 5.5%;
            /* Ключевой момент для центровки */
            transform: translate(-50%, -50%);
        }
        .nav-btn:hover { background: rgba(0, 255, 255, 0.4); }

        /* Точное позиционирование центров кнопок */
        .btn-anl  { top: 52.8%; left: 50.0%; }
        .btn-core { top: 83.0%; left: 18.5%; }
        .btn-jr   { top: 83.0%; left: 32.5%; }
        .btn-mid  { top: 83.0%; left: 46.5%; }
        .btn-sr   { top: 83.0%; left: 60.5%; }
        .btn-lead { top: 83.0%; left: 74.5%; }
    </style>
</head>
<body>

<div class="container">
    <img src="background.png" alt="JET Engineering" class="bg-image">
    
    <a href="#" class="nav-btn btn-anl">ANL</a>
    <a href="#" class="nav-btn btn-core">CORE</a>
    <a href="#" class="nav-btn btn-jr">JR</a>
    <a href="#" class="nav-btn btn-mid">MID</a>
    <a href="#" class="nav-btn btn-sr">SR</a>
    <a href="#" class="nav-btn btn-lead">LEAD</a>
</div>

</body>
</html>
