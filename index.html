<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #0b0e14; }
        .container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
        }
        .bg-image { width: 100%; height: auto; display: block; }
        
        .nav-btn {
            position: absolute;
            border: 2px solid #00f2ff;
            background: rgba(0, 255, 255, 0.2);
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 6px;
            width: 8.0%;
            height: 5.0%;
            transform: translate(-50%, -50%);
        }
        .nav-btn:hover { background: rgba(0, 255, 255, 0.4); }

        /* Примененные корректировки: */
        /* ANL: вниз на 2мм (~0.2%) */
        .btn-anl  { top: 53.0%; left: 50.0%; }
        
        /* CORE (2): вниз на 2мм (~0.3%), вправо на 6мм (~0.4%) */
        .btn-core { top: 83.8%; left: 19.7%; }
        
        /* JR (3): вниз на 2мм (~0.3%), вправо на 5мм (~0.3%) */
        .btn-jr   { top: 83.8%; left: 34.0%; }
        
        /* MID (4): вниз на 2мм (~0.3%), вправо на 3мм (~0.2%) */
        .btn-mid  { top: 83.8%; left: 48.3%; }
        
        /* SR (5): вниз на 2мм (~0.3%) */
        .btn-sr   { top: 83.8%; left: 62.5%; }
        
        /* LEAD (6): вниз на 2мм (~0.3%), влево на 2мм (~0.15%) */
        .btn-lead { top: 83.8%; left: 76.75%; }
    </style>
</head>
<body>

<div class="container">
    <img src="background.png" alt="JET Engineering" class="bg-image">
    
    <a href="URL_АНАЛИТИКА" class="nav-btn btn-anl">ANL</a>
    <a href="URL_CORE" class="nav-btn btn-core">CORE</a>
    <a href="URL_JUNIOR" class="nav-btn btn-jr">JR</a>
    <a href="URL_MIDDLE" class="nav-btn btn-mid">MID</a>
    <a href="URL_SENIOR" class="nav-btn btn-sr">SR</a>
    <a href="URL_LEAD" class="nav-btn btn-lead">LEAD</a>
</div>

</body>
</html>
