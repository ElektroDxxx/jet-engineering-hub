<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #0b0e14; }
        .container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
        }
        .bg-image { width: 100%; height: auto; display: block; }
        
        /* Видимые кнопки для настройки */
        .nav-btn {
            position: absolute;
            border: 2px solid #00f2ff;
            background: rgba(0, 255, 255, 0.3);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            /* Квадратный размер */
            width: 7.2%;
            height: 5.2%;
        }

        /* Позиционирование - двигаем всё вверх и плотнее */
        .btn-anl  { top: 48.0%; left: 50%; transform: translate(-50%, -50%); width: 8%; height: 4.5%; }
        .btn-core { bottom: 12.5%; left: 20.8%; }
        .btn-jr   { bottom: 12.5%; left: 34.0%; }
        .btn-mid  { bottom: 12.5%; left: 47.2%; }
        .btn-sr   { bottom: 12.5%; left: 60.4%; }
        .btn-lead { bottom: 12.5%; left: 73.6%; }
    </style>
</head>
<body>

<div class="container">
    <img src="background.png" alt="JET Engineering" class="bg-image">
    
    <a href="#" class="nav-btn btn-anl">ANL</a>
    <a href="#" class="nav-btn btn-core">CORE</a>
    <a href="#" class="nav-btn btn-jr">JR</a>
    <a href="#" class="nav-btn btn-mid">MID</a>
    <a href="#" class="nav-btn btn-sr">SR</a>
    <a href="#" class="nav-btn btn-lead">LEAD</a>
</div>

</body>
</html>
