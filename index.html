<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .hero {
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100%;
            position: relative;
        }
        .btn {
            position: absolute;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00f2ff;
            color: white;
            padding: 12px 24px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background: rgba(0, 242, 255, 0.6); border-color: #fff; }
    </style>
</head>
<body>
    <div class="hero">
        <a href="#" class="btn" style="top: 82%; left: 12%;">Core Skills</a>
        <a href="#" class="btn" style="top: 82%; left: 27%;">Junior</a>
        <a href="#" class="btn" style="top: 82%; left: 40%;">Middle</a>
        <a href="#" class="btn" style="top: 82%; left: 53%;">Senior</a>
        <a href="#" class="btn" style="top: 82%; left: 66%;">Lead/Expert</a>
        <a href="#" class="btn" style="top: 45%; left: 46%;">Analytics</a>
    </div>
</body>
</html>
