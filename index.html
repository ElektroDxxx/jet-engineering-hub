<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #0b0e14; overflow: hidden; }
        .container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
        }
        .bg-image { width: 100%; height: auto; display: block; }
        
        .nav-btn {
            position: absolute;
            text-decoration: none;
            cursor: pointer;
            width: 8.0%;
            height: 5.0%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
            /* Эффект "молнии": легкая вспышка при наведении */
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            box-shadow: 0 0 15px 5px rgba(0, 242, 255, 0.6);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Координаты */
        .btn-anl  { top: 55.2%; left: 50.0%; }
        .btn-core { top: 86.0%; left: 23.1%; }
        .btn-jr   { top: 86.0%; left: 36.9%; }
        .btn-mid  { top: 86.0%; left: 49.7%; }
        .btn-sr   { top: 86.0%; left: 62.5%; }
        .btn-lead { top: 86.0%; left: 76.25%; }
    </style>
</head>
<body>

<div class="container">
    <img src="background.png" alt="JET Engineering" class="bg-image">
    
    <a href="https://docs.google.com/spreadsheets/d/1jXJbMaGhKpx_2N8TaGSfu8znwgn4F7-K-IukQ5ikpRQ/edit?usp=sharing" target="_blank" class="nav-btn btn-anl"></a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSed5o4uyhn1SvSrulR2lxqi-tI9-ufLtUgXOsPwskRVrozLlA/viewform?usp=header" target="_blank" class="nav-btn btn-core"></a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSctxF2y_Pg0MwSImyaK2BWU7tsxrcRcGCcZ_0-RBthOZJYjnA/viewform?usp=header" target="_blank" class="nav-btn btn-jr"></a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLScCpDxv9PiFAW_z1iL8kLgkrRDG4T1avNmpZEyraTR30sU2gg/viewform?usp=header" target="_blank" class="nav-btn btn-mid"></a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSesWJwtu7pf_JVaZazFd7zH6dDbMUH8oQoaqYev6ILrDSBoCA/viewform?usp=header" target="_blank" class="nav-btn btn-sr"></a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLScE2p6-db_QsoBsARSaahIxSayR8hvsy4_WCoBLznpK-3Biqg/viewform?usp=header" target="_blank" class="nav-btn btn-lead"></a>
</div>

</body>
</html>
