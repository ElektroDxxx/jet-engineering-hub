<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b0e14; }
        .hero {
            background-image: url('background.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center top;
            height: 100vh;
            width: 100%;
            position: relative;
        }
        .btn {
            position: absolute;
            width: 140px;
            height: 60px;
            cursor: pointer;
            border: none;
            background: rgba(0, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.1);
        }
        .btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5), inset 0 0 5px rgba(255, 255, 255, 0.2);
        }
        .btn:active {
            transform: scale(0.95);
            background: rgba(0, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="hero">
        <a href="#" id="btn-core" class="btn" style="top: 81%; left: 19.5%;"></a>
        <a href="#" id="btn-junior" class="btn" style="top: 81%; left: 33.5%;"></a>
        <a href="#" id="btn-middle" class="btn" style="top: 81%; left: 46.0%;"></a>
        <a href="#" id="btn-senior" class="btn" style="top: 81%; left: 59.5%;"></a>
        <a href="#" id="btn-lead" class="btn" style="top: 81%; left: 72.0%;"></a>
        <a href="#" id="btn-analytics" class="btn" style="top: 44%; left: 45.8%;"></a>
    </div>
</body>
</html>
